name: PR Test Results

on:
  pull_request:
    branches: [main]

jobs:
  test-and-comment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci --force

      - name: Type check
        id: typecheck
        run: npx tsc --noEmit 2>&1 | tee /tmp/typecheck.txt
        continue-on-error: true

      - name: Lint
        id: lint
        run: npm run lint 2>&1 | tee /tmp/lint.txt
        continue-on-error: true

      - name: Tests
        id: tests
        run: npm test 2>&1 | tee /tmp/tests.txt
        continue-on-error: true

      - name: Post results comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_PAT }}
          script: |
            const fs = require('fs');

            const typecheck = '${{ steps.typecheck.outcome }}';
            const lint = '${{ steps.lint.outcome }}';
            const tests = '${{ steps.tests.outcome }}';

            const icon = (status) => status === 'success' ? '✅' : '❌';
            const allPassed = typecheck === 'success' && lint === 'success' && tests === 'success';

            // Extract test count from output
            let testSummary = '';
            try {
              const testOutput = fs.readFileSync('/tmp/tests.txt', 'utf8');
              const match = testOutput.match(/Tests\s+(\d+)\s+passed/);
              if (match) testSummary = ` (${match[1]} passed)`;
            } catch {}

            const body = [
              allPassed ? '## ✅ All checks passed' : '## ❌ Some checks failed',
              '',
              '| Check | Status |',
              '|-------|--------|',
              `| Type check | ${icon(typecheck)} ${typecheck} |`,
              `| Lint | ${icon(lint)} ${lint} |`,
              `| Tests | ${icon(tests)} ${tests}${testSummary} |`,
              '',
              `*Posted by [SideCarAI-Bot](https://github.com/SideCarAI-Bot)*`,
            ].join('\n');

            // Find existing bot comment to update instead of creating duplicates
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.body?.includes('Posted by [SideCarAI-Bot]')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if any check failed
        if: steps.typecheck.outcome != 'success' || steps.lint.outcome != 'success' || steps.tests.outcome != 'success'
        run: exit 1
